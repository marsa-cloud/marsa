name: GHCR cleanup

# Prunes accumulated per-commit container images from GHCR.
#
# cd.yml publishes `sha-<commit>` + `latest` on every push to main, and v-less
# semver tags (`1.2.3`, `1.2`) on `v*` tags. buildx (build-push-action, no
# `provenance: false` in cd.yml) also attaches a provenance attestation as an
# *untagged child manifest* of each tagged image index. The `sha-*` images and
# their attestation children accumulate forever.
#
# This workflow uses dataaxiom/ghcr-cleanup-action, which is manifest-graph
# aware: it deletes an image's attestation/multi-arch children together with the
# image, reaps orphaned (`sha256-…`) attestation artifacts left by previously
# deleted images, and preserves the children of images it keeps. That fixes the
# orphan-accumulation leak of the previous hand-rolled `gh api` script.
#
# Keep rule: `latest` + numeric semver tags are excluded from every rule; the 10
# most-recent `sha-*` images are kept as a rollback window; anything else older
# than 14 days is eligible for deletion. See docs/agdr/AgDR-0038 (supersedes
# AgDR-0037).

on:
  schedule:
    # Weekly, Sundays 03:00 UTC.
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'List what would be deleted without deleting it'
        type: boolean
        default: false

concurrency:
  group: ghcr-cleanup
  cancel-in-progress: false

# GITHUB_TOKEN with packages:write can delete versions of packages linked to
# this repo. If org-owned package permissions block it (403), swap in a PAT with
# delete:packages via a repo secret — see the AgDR for the fallback.
permissions:
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    strategy:
      # Independent per package; one 403 shouldn't hide the other's result.
      fail-fast: false
      matrix:
        package: [marsa-api, marsa-web]
    steps:
      - name: Prune stale GHCR versions (keep latest + semver + N recent sha-*)
        # Pinned by commit SHA (v1.2.2). Bumping the pin is a deliberate,
        # reviewable change — verify the SHA against the release tag on any bump.
        uses: dataaxiom/ghcr-cleanup-action@d52806a0dc70b430571a37da1fde39733ffd640f # v1.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          owner: marsa-cloud
          package: ${{ matrix.package }}
          # Protect `latest` and v-less numeric semver tags (`1.2`, `1.2.3`,
          # incl. pre-release suffixes) from every rule. cd.yml emits v-less
          # semver, so a `v*` glob would miss them — hence the numeric regex.
          use-regex: true
          exclude-tags: '^latest$,^\d+\.\d+.*$'
          # Keep the 10 most-recent sha-* images (rollback window); their
          # attestation children are preserved with them.
          keep-n-tagged: 10
          # Only reap things older than 14 days (preserves AgDR-0037's intent).
          older-than: '14 days'
          # Reap untagged versions AND orphaned sha256-… attestation artifacts
          # left behind by previously deleted images.
          delete-untagged: true
          delete-orphaned-images: true
          # Assert kept multi-arch images still have their children after the
          # run — guards against orphaning a live attestation.
          validate: true
          # dry-run only when manually dispatched with the box ticked; scheduled
          # runs are always armed.
          dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
