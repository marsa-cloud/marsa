name: Security

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # Static analysis — OWASP Top 10 + TypeScript + Node.js rulesets.
  # Blocking: --error makes any finding fail the job. Baseline at
  # introduction was 0 findings (issue #43).
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      # Pinned to a version + digest (#110 / AgDR-0033). Renovate
      # keeps this digest current.
      image: semgrep/semgrep:1.167.0@sha256:06938c1f365d3f67b8cedd8bc117607ae64253f88a0e768e9da9408548927dd6
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Semgrep scan
        # On a PR, scan diff-aware against the base commit so a newly-added
        # registry rule can only fail on code THIS PR introduces
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          set -- \
            --config p/owasp-top-ten \
            --config p/typescript \
            --config p/nodejs \
            --exclude node_modules \
            --exclude .nuxt \
            --exclude dist \
            --exclude '*.gen.ts' \
            --error \
            --metrics off
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            set -- "$@" --baseline-commit "${{ github.event.pull_request.base.sha }}"
          fi
          semgrep scan "$@"

  secrets:
    name: Secret scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        run: |
          docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:latest \
            git file:///repo --only-verified --fail --no-update

  dependency-audit:
    name: Dependency audit (pnpm)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (blocking on critical)
        run: |
          audit_failed=0
          {
            echo '## Dependency audit'
            echo ''
            echo '```'
            pnpm audit --audit-level=critical 2>&1 || audit_failed=1
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$audit_failed" -eq 1 ]; then
            echo "::error::pnpm audit found critical vulnerabilities"
            exit 1
          fi
