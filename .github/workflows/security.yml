name: Security

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # Static analysis — OWASP Top 10 + TypeScript + Node.js rulesets.
  # Blocking: --error makes any finding fail the job. Baseline at
  # introduction was 0 findings (issue #43).
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep scan
        run: >-
          semgrep scan
          --config p/owasp-top-ten
          --config p/typescript
          --config p/nodejs
          --exclude node_modules
          --exclude .nuxt
          --exclude dist
          --exclude '*.gen.ts'
          --error
          --metrics off

  # Secret detection over full git history. Blocking: --fail exits non-zero
  # on any verified secret. --only-verified keeps false positives near-zero
  # (a secret is reported only after it's confirmed live against its provider).
  secrets:
    name: Secret scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        run: |
          docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:latest \
            git file:///repo --only-verified --fail --no-update

  # Dependency vulnerability audit.
  # ADVISORY for now: `|| true` means findings are reported in the job
  # summary but do not fail CI. The repo currently carries known transitive
  # vulnerabilities (mostly the dev-only `happy-dom` test environment).
  # TODO(#43 follow-up / handover next-step #3 `/audit-deps`): once the
  # backlog of high/critical advisories is cleared, drop the `|| true` and
  # set `--audit-level=high` so this job blocks.
  dependency-audit:
    name: Dependency audit (pnpm, advisory)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (advisory)
        run: |
          {
            echo '## Dependency audit (advisory)'
            echo ''
            echo '```'
            pnpm audit --audit-level=low 2>&1 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
