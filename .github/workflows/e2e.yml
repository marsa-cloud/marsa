name: E2E

on:
  workflow_run:
    workflows: ['CD']
    types: [completed]
  # On-demand run against any branch (dispatch requires this trigger to be on
  # the default branch). Installs an existing image tag — CD does not build one
  # for unlabelled branches — while checking out the dispatched branch's scripts,
  # so the test harness can be iterated without merging to main.
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Existing image tag to install (e.g. latest, sha-557b028)'
        required: false
        default: latest

permissions:
  contents: read

jobs:
  e2e:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Runners preinstall Helm 3.x, which install.sh now rejects rather than
      # silently upgrading. Overwrite /usr/local/bin/helm so the sudo'd
      # install.sh resolves Helm 4 through sudo's secure_path.
      - name: Install Helm 4
        run: |
          curl -sfL https://raw.githubusercontent.com/helm/helm/v4.1.3/scripts/get-helm-4 | sudo bash
          sudo helm version --short

      - name: Install Marsa (full real K3s)
        env:
          EVENT: ${{ github.event_name }}
          WR_SHA: ${{ github.event.workflow_run.head_sha }}
          INPUT_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          if [ "$EVENT" = workflow_dispatch ]; then
            tag="${INPUT_TAG:-latest}"
          else
            tag="sha-$(printf '%s' "$WR_SHA" | cut -c1-7)"
          fi
          echo "Installing image tag: $tag"
          sudo MARSA_IMAGE_TAG="$tag" bash scripts/install.sh --domain 127.0.0.1.nip.io --no-tls

      - name: E2E deploy + HTTPS assertions
        run: sudo KUBECONFIG=/etc/rancher/k3s/k3s.yaml bash scripts/e2e-test.sh
