name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: marsa
          POSTGRES_PASSWORD: marsa
          POSTGRES_DB: marsa_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: populate env
        run: cp ./apps/api/.env.test ./apps/api/.env

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify generated API contract is in sync
        run: |
          pnpm --filter api generate:openapi
          pnpm --filter web generate:api
          if ! git diff --exit-code -- apps/api/openapi.json 'apps/web/app/api'; then
            echo "::error::Generated API contract is out of date. Run 'pnpm --filter api generate:openapi && pnpm --filter web generate:api' and commit the result."
            exit 1
          fi

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Type check API
        run: pnpm --filter api typecheck

      - name: Type check Web
        run: pnpm --filter web typecheck

      - name: Build Web
        run: pnpm run build:web

      - name: Test API
        run: pnpm --filter api test

      - name: Test Web (unit + component)
        run: pnpm --filter web test

      - name: Get Playwright version
        id: playwright-version
        run: |
          echo "version=$(pnpm --filter web list playwright --depth=0 --json | jq -r '.[0].devDependencies.playwright.version')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Start seeded API for web e2e
        run: |
          pnpm --filter api build
          cd apps/api
          COOKIE=$(node --env-file=.env dist/src/entrypoints/seed-dev.js | grep -o 'marsa_session=[^ ]*')
          if [ -z "$COOKIE" ]; then echo "::error::seed-dev emitted no session cookie"; exit 1; fi
          echo "E2E_SESSION_COOKIE=$COOKIE" >> "$GITHUB_ENV"
          node --env-file=.env dist/src/entrypoints/api.js &
          echo "API_PID=$!" >> "$GITHUB_ENV"
          for _ in $(seq 1 30); do
            curl -sf http://localhost:3000/api/v1/status >/dev/null && { echo "API ready"; exit 0; }
            sleep 1
          done
          echo "::error::API did not become ready on :3000"; exit 1

      - name: Test Web (e2e)
        run: pnpm --filter web test:e2e

      - name: Stop seeded API
        if: always()
        run: '[ -n "${API_PID:-}" ] && kill "$API_PID" 2>/dev/null || true'
