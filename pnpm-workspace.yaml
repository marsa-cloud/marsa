packages:
  - 'apps/*'
  - 'packages/*'

ignoredBuiltDependencies:
  - '@parcel/watcher'
  - '@tailwindcss/oxide'
  - esbuild
  - unrs-resolver
  - vue-demi

catalog:
  # Tooling
  typescript: ^5.7.3
  prettier: ^3.4.2

  # ESLint stack
  eslint: ^9.18.0
  '@eslint/js': ^9.18.0
  eslint-config-prettier: ^10.0.0
  eslint-plugin-prettier: ^5.2.2
  eslint-plugin-simple-import-sort: ^12.1.1
  eslint-plugin-unused-imports: ^4.1.4
  typescript-eslint: ^8.20.0
  globals: ^17.0.0

  # MikroORM (api)
  '@mikro-orm/core': ^6.0.0
  '@mikro-orm/postgresql': ^6.0.0
  '@mikro-orm/nestjs': ^6.0.0
  '@mikro-orm/migrations': ^6.0.0

  # NestJS (api)
  '@nestjs/common': ^11.0.1
  '@nestjs/core': ^11.0.1
  '@nestjs/platform-express': ^11.0.1
  '@nestjs/swagger': ^11.4.4
  '@nestjs/cli': ^11.0.0
  '@nestjs/schematics': ^11.0.0
  '@nestjs/testing': ^11.0.1
  reflect-metadata: ^0.2.2
  rxjs: ^7.8.1

  # Node / test tooling (api)
  '@types/express': ^5.0.0
  '@types/node': ^24.0.0
  '@types/sinon': ^17.0.0
  '@types/supertest': ^7.0.0
  sinon: ^19.0.0
  ts-loader: ^9.5.2
  ts-node: ^10.9.2
  tsconfig-paths: ^4.2.0
  tsx: ^4.19.0
  source-map-support: ^0.5.21
  supertest: ^7.0.0

  # Nuxt (web)
  nuxt: ^4.4.5
  '@nuxt/eslint': ^1.15.2
  '@nuxt/ui': ^4.7.1
  '@iconify-json/lucide': ^1.2.106
  '@iconify-json/simple-icons': ^1.2.81
  tailwindcss: ^4.3.0
  vue-tsc: ^3.2.8

  # Web ↔ API contract codegen
  '@hey-api/openapi-ts': ^0.97.3
  zod: ^3.25.76

  # Test stack (web)
  vitest: ^3.0.0
  '@vitest/coverage-v8': ^3.0.0
  '@vue/test-utils': ^2.4.6
  '@nuxt/test-utils': ^3.19.0
  happy-dom: ^17.0.0
  playwright: ^1.50.0
